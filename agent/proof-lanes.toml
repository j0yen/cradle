# proof-lanes.toml — change-class → required-lane routing.
# READ-ONLY after scaffold. The edit-agent must NOT modify this.
#
# Lifted shape from jankurai/agent/proof-lanes.toml. Each lane has a set of
# globs that route to it. A Stage-3 advance requires every changed path to
# resolve to ≥1 lane AND that lane's required_command must be green.

[[lane]]
id = "rust-source"
description = "Behavior changes in src/ and crates/*/src/ (workspace v0.1)"
globs = ["src/**/*.rs", "crates/*/src/**/*.rs"]
required_commands = [
  "cargo check --workspace",
  "cargo clippy --workspace -- -D warnings",
  "cargo test --workspace",
]

[[lane]]
id = "rust-tests"
description = "Test-only changes (acceptance test bodies are edit-agent-owned per AUTOBUILDER_PROGRAM.md)"
globs = ["tests/**/*.rs", "crates/*/tests/**/*.rs"]
required_commands = [
  "cargo test --workspace",
]

[[lane]]
id = "deps"
description = "Cargo.toml / Cargo.lock changes (workspace + member manifests)"
globs = ["Cargo.toml", "Cargo.lock", "crates/*/Cargo.toml"]
required_commands = [
  "cargo check --workspace",
  "cargo deny check bans licenses sources",
]

[[lane]]
id = "docs"
description = "README, LICENSE, gitignore — text-only artifacts that do not affect behavior"
globs = ["README.md", "LICENSE-MIT", "LICENSE-APACHE", ".gitignore"]
required_commands = [
  "cargo check --workspace",
]

[[lane]]
id = "model-specs"
description = "Per-model spec.toml and train.py shells (data, not behavior)"
globs = ["models/*/spec.toml", "models/*/train.py"]
required_commands = [
  "cargo test --workspace",
]

[[lane]]
id = "ci"
description = "GitHub Actions workflow changes"
globs = [".github/workflows/**"]
required_commands = [
  "scripts/audit.sh",
]

[[lane]]
id = "harness-readonly"
description = "Harness files; should never change after scaffold"
globs = [
  "scripts/run-metrics.sh",
  "scripts/audit.sh",
  "scripts/risk-gate.sh",
  "clippy.toml",
  "deny.toml",
  "rust-toolchain.toml",
]
required_commands = [
  "exit 1",
]
note = "Any change to a harness-readonly path fails the gate. Use an intent-card amendment to legitimately modify."

[[lane]]
id = "agent-readonly"
description = "agent/ files (intent-card, owner-map, proof-lanes); legitimate amendment lane"
globs = [
  "agent/intent-card.json",
  "agent/owner-map.json",
  "agent/proof-lanes.toml",
  "agent/test-map.json",
  "agent/AUTOBUILDER_PROGRAM.md",
]
required_commands = [
  "cargo test --workspace",
]
note = "Changes to agent/ are amendment-class. They route here so the gate can record them, but the corresponding scaffold/intent-card amendment record should accompany any such change."
